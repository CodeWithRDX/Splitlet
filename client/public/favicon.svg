<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Beautiful modern emerald-to-teal gradient -->
    <linearGradient id="splitletGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>
  <!-- Main Rounded Glassy Square -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#splitletGrad)" filter="url(#dropShadow)" />
  <!-- Glossy overlay reflection -->
  <rect x="32" y="32" width="448" height="224" rx="112" fill="#ffffff" fill-opacity="0.08" />
  <!-- Stylish, bold Letter S representing Splitlet -->
  <text x="256" y="356" 
        font-family="'Outfit', 'Segoe UI', sans-serif" 
        font-size="310" 
        font-weight="900" 
        fill="#090d16" 
        text-anchor="middle" 
        letter-spacing="-0.05em">S</text>
</svg>